# ===========================================================================
# docker-compose.coolify.yaml  —  Dify on Coolify (v5 - Redis Fix)
#
# KEY CHANGES FROM v4:
#   - Redis switched to bitnami/redis:6.2 (uses REDIS_PASSWORD env var)
#     The official redis:alpine image ignores --requirepass on Coolify.
#   - SECRET_KEY hardcoded (no longer uses ${SECRET_KEY:-...} fallback)
#   - Redis volume path updated to /bitnami/redis/data
#
# BEFORE DEPLOYING:
#   1. Delete the redis persistent storage volume in Coolify UI
#   2. Then Redeploy
# ===========================================================================

services:

  # ── Init ───────────────────────────────────────────────────────────────────
  init_permissions:
    image: busybox:latest
    command:
      - sh
      - -c
      - chown -R 1001:1001 /app/api/storage && echo "Permissions set."
    volumes:
      - ./volumes/app/storage:/app/api/storage
    restart: "no"

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db_postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: difyai123456
      POSTGRES_DB: dify
      PGDATA: /var/lib/postgresql/data/pgdata
    command: >
      postgres
        -c max_connections=100
        -c shared_buffers=128MB
        -c work_mem=4MB
        -c maintenance_work_mem=64MB
        -c effective_cache_size=4096MB
    volumes:
      - ./volumes/db/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-U", "postgres", "-d", "dify"]
      interval: 5s
      timeout: 5s
      retries: 30

  # ── Redis ──────────────────────────────────────────────────────────────────
  # Uses entrypoint + /tmp to write redis.conf inline. mkdir -p ensures the
  # directory exists in alpine. start_period gives Redis time to load old RDB.
  redis:
    image: redis:6-alpine
    restart: always
    entrypoint:
      - sh
      - -c
      - |
        mkdir -p /tmp/redisconf
        printf 'requirepass difyai123456\nbind 0.0.0.0\ndir /data\nsave 900 1\nsave 300 10\nuser default on >difyai123456 ~* &* +@all\n' > /tmp/redisconf/redis.conf
        # Delete stale dump.rdb which stores old ACL (no-password) and overrides requirepass
        rm -f /data/dump.rdb
        redis-server /tmp/redisconf/redis.conf
    volumes:
      - ./volumes/redis/data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a difyai123456 -p 6379 ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ── Weaviate ───────────────────────────────────────────────────────────────
  weaviate:
    image: semitechnologies/weaviate:1.27.0
    restart: always
    volumes:
      - ./volumes/weaviate:/var/lib/weaviate
    environment:
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      QUERY_DEFAULTS_LIMIT: "25"
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "false"
      DEFAULT_VECTORIZER_MODULE: none
      CLUSTER_HOSTNAME: node1
      AUTHENTICATION_APIKEY_ENABLED: "true"
      AUTHENTICATION_APIKEY_ALLOWED_KEYS: WVF5YThaHlkYwhGUSmCRgsX3tD5ngdN8pkih
      AUTHENTICATION_APIKEY_USERS: hello@dify.ai
      AUTHORIZATION_ADMINLIST_ENABLED: "true"
      AUTHORIZATION_ADMINLIST_USERS: hello@dify.ai
      DISABLE_TELEMETRY: "true"

  # ── Sandbox ────────────────────────────────────────────────────────────────
  sandbox:
    image: langgenius/dify-sandbox:0.2.12
    restart: always
    entrypoint:
      - sh
      - -c
      - |
        mkdir -p /conf
        printf 'app:\n  port: 8194\n  debug: false\n  key: dify-sandbox\nmax_workers: 4\nmax_requests: 50\nworker_timeout: 15\npython_path: /usr/local/bin/python3\nenable_network: true\nallowed_syscalls:\nproxy:\n  socks5: ""\n  http: "http://ssrf_proxy:3128"\n  https: "http://ssrf_proxy:3128"\n' > /conf/config.yaml
        /main
    environment:
      API_KEY: dify-sandbox
      GIN_MODE: release
      WORKER_TIMEOUT: "15"
      ENABLE_NETWORK: "true"
      HTTP_PROXY: http://ssrf_proxy:3128
      HTTPS_PROXY: http://ssrf_proxy:3128
      SANDBOX_PORT: "8194"
    volumes:
      - ./volumes/sandbox/dependencies:/dependencies
    networks:
      - ssrf_proxy_network

  # ── SSRF Proxy ─────────────────────────────────────────────────────────────
  ssrf_proxy:
    image: ubuntu/squid:latest
    restart: always
    entrypoint:
      - sh
      - -c
      - |
        printf 'acl sandbox_net src 172.0.0.0/8\nacl sandbox_host dst 172.0.0.0/8\nhttp_access allow localhost\nhttp_access allow sandbox_net\nhttp_access allow sandbox_host\nhttp_access deny all\nhttp_port 3128\ncoredump_dir /var/spool/squid\ndns_v4_first on\n' > /etc/squid/squid.conf
        squid -f /etc/squid/squid.conf -N
    networks:
      - ssrf_proxy_network
      - default

  # ── Plugin Daemon ──────────────────────────────────────────────────────────
  plugin_daemon:
    image: langgenius/dify-plugin-daemon:0.5.4-local
    restart: always
    environment:
      DB_TYPE: postgresql
      DB_HOST: db_postgres
      DB_PORT: "5432"
      DB_USERNAME: postgres
      DB_PASSWORD: difyai123456
      DB_DATABASE: dify_plugin
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: difyai123456
      REDIS_DB: "0"
      SECRET_KEY: a9f3e2c1d4b5087612345678abcdef90a9f3e2c1d4b5087612345678abcdef90
      SERVER_PORT: "5002"
      SERVER_KEY: lYkiYYT6owG+71oLerGzA7GXCgOT++6ovaezWAjpCjf+Sjc3ZtU+qUEi
      DIFY_INNER_API_URL: http://api:5001
      DIFY_INNER_API_KEY: QaHbTe77CtuXmsfyhR7+vRjI/+XbV1AaFy691iy+kGDv2Jvy0/eAh8Y1
      PLUGIN_REMOTE_INSTALLING_HOST: 0.0.0.0
      PLUGIN_REMOTE_INSTALLING_PORT: "5003"
      PLUGIN_WORKING_PATH: /app/storage/cwd
      PLUGIN_STORAGE_TYPE: local
      PLUGIN_STORAGE_LOCAL_ROOT: /app/storage
      PLUGIN_INSTALLED_PATH: plugin
      PLUGIN_PACKAGE_CACHE_PATH: plugin_packages
      PLUGIN_MEDIA_CACHE_PATH: assets
      MAX_PLUGIN_PACKAGE_SIZE: "52428800"
      PLUGIN_MAX_EXECUTION_TIMEOUT: "600"
      PLUGIN_STDIO_BUFFER_SIZE: "1024"
      PLUGIN_STDIO_MAX_BUFFER_SIZE: "5242880"
      PYTHON_ENV_INIT_TIMEOUT: "120"
      PPROF_ENABLED: "false"
      FORCE_VERIFYING_SIGNATURE: "true"
      MARKETPLACE_ENABLED: "true"
      MARKETPLACE_API_URL: https://marketplace.dify.ai
      DEPLOY_ENV: PRODUCTION
      LOG_LEVEL: INFO
    volumes:
      - ./volumes/plugin_daemon:/app/storage
    depends_on:
      db_postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── API ────────────────────────────────────────────────────────────────────
  api:
    image: langgenius/dify-api:1.13.2
    restart: always
    environment:
      MODE: api
      DB_TYPE: postgresql
      DB_HOST: db_postgres
      DB_PORT: "5432"
      DB_USERNAME: postgres
      DB_PASSWORD: difyai123456
      DB_DATABASE: dify
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: difyai123456
      REDIS_DB: "0"
      CELERY_BROKER_URL: redis://:difyai123456@redis:6379/1
      CELERY_BACKEND: redis
      CONSOLE_API_URL: http://care.jyotaish.in
      CONSOLE_WEB_URL: http://care.jyotaish.in
      APP_API_URL: http://care.jyotaish.in
      APP_WEB_URL: http://care.jyotaish.in
      SERVICE_API_URL: http://care.jyotaish.in
      FILES_URL: http://care.jyotaish.in
      ENDPOINT_URL_TEMPLATE: http://care.jyotaish.in/e/{hook_id}
      SECRET_KEY: a9f3e2c1d4b5087612345678abcdef90a9f3e2c1d4b5087612345678abcdef90
      INNER_API_KEY_FOR_PLUGIN: QaHbTe77CtuXmsfyhR7+vRjI/+XbV1AaFy691iy+kGDv2Jvy0/eAh8Y1
      PLUGIN_DAEMON_URL: http://plugin_daemon:5002
      PLUGIN_DAEMON_KEY: lYkiYYT6owG+71oLerGzA7GXCgOT++6ovaezWAjpCjf+Sjc3ZtU+qUEi
      PLUGIN_DIFY_INNER_API_URL: http://api:5001
      PLUGIN_DIFY_INNER_API_KEY: QaHbTe77CtuXmsfyhR7+vRjI/+XbV1AaFy691iy+kGDv2Jvy0/eAh8Y1
      STORAGE_TYPE: opendal
      OPENDAL_SCHEME: fs
      OPENDAL_FS_ROOT: storage
      VECTOR_STORE: weaviate
      WEAVIATE_ENDPOINT: http://weaviate:8080
      WEAVIATE_API_KEY: WVF5YThaHlkYwhGUSmCRgsX3tD5ngdN8pkih
      WEAVIATE_GRPC_ENDPOINT: grpc://weaviate:50051
      CODE_EXECUTION_ENDPOINT: http://sandbox:8194
      CODE_EXECUTION_API_KEY: dify-sandbox
      SSRF_PROXY_HTTP_URL: http://ssrf_proxy:3128
      SSRF_PROXY_HTTPS_URL: http://ssrf_proxy:3128
      DEPLOY_ENV: PRODUCTION
      MIGRATION_ENABLED: "true"
      LOG_LEVEL: INFO
      WEB_API_CORS_ALLOW_ORIGINS: "*"
      CONSOLE_CORS_ALLOW_ORIGINS: "*"
      RESPECT_XFORWARD_HEADERS_ENABLED: "true"
      SERVER_WORKER_AMOUNT: "1"
      SERVER_WORKER_CLASS: gevent
      GUNICORN_TIMEOUT: "360"
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      REFRESH_TOKEN_EXPIRE_DAYS: "30"
      MARKETPLACE_ENABLED: "true"
      MARKETPLACE_API_URL: https://marketplace.dify.ai
      FORCE_VERIFYING_SIGNATURE: "true"
      INIT_PASSWORD: ""
    depends_on:
      init_permissions:
        condition: service_completed_successfully
      db_postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./volumes/app/storage:/app/api/storage
    networks:
      - default
      - ssrf_proxy_network
      - coolify

  # ── Worker ─────────────────────────────────────────────────────────────────
  worker:
    image: langgenius/dify-api:1.13.2
    restart: always
    environment:
      MODE: worker
      DB_TYPE: postgresql
      DB_HOST: db_postgres
      DB_PORT: "5432"
      DB_USERNAME: postgres
      DB_PASSWORD: difyai123456
      DB_DATABASE: dify
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: difyai123456
      REDIS_DB: "0"
      CELERY_BROKER_URL: redis://:difyai123456@redis:6379/1
      CELERY_BACKEND: redis
      CONSOLE_API_URL: http://care.jyotaish.in
      CONSOLE_WEB_URL: http://care.jyotaish.in
      APP_API_URL: http://care.jyotaish.in
      APP_WEB_URL: http://care.jyotaish.in
      SECRET_KEY: a9f3e2c1d4b5087612345678abcdef90a9f3e2c1d4b5087612345678abcdef90
      INNER_API_KEY_FOR_PLUGIN: QaHbTe77CtuXmsfyhR7+vRjI/+XbV1AaFy691iy+kGDv2Jvy0/eAh8Y1
      PLUGIN_DAEMON_URL: http://plugin_daemon:5002
      PLUGIN_DAEMON_KEY: lYkiYYT6owG+71oLerGzA7GXCgOT++6ovaezWAjpCjf+Sjc3ZtU+qUEi
      STORAGE_TYPE: opendal
      OPENDAL_SCHEME: fs
      OPENDAL_FS_ROOT: storage
      VECTOR_STORE: weaviate
      WEAVIATE_ENDPOINT: http://weaviate:8080
      WEAVIATE_API_KEY: WVF5YThaHlkYwhGUSmCRgsX3tD5ngdN8pkih
      CODE_EXECUTION_ENDPOINT: http://sandbox:8194
      CODE_EXECUTION_API_KEY: dify-sandbox
      SSRF_PROXY_HTTP_URL: http://ssrf_proxy:3128
      SSRF_PROXY_HTTPS_URL: http://ssrf_proxy:3128
      DEPLOY_ENV: PRODUCTION
      LOG_LEVEL: INFO
      RESPECT_XFORWARD_HEADERS_ENABLED: "true"
    depends_on:
      init_permissions:
        condition: service_completed_successfully
      db_postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./volumes/app/storage:/app/api/storage
    networks:
      - default
      - ssrf_proxy_network
      - coolify

  # ── Worker Beat ────────────────────────────────────────────────────────────
  worker_beat:
    image: langgenius/dify-api:1.13.2
    restart: always
    environment:
      MODE: beat
      DB_TYPE: postgresql
      DB_HOST: db_postgres
      DB_PORT: "5432"
      DB_USERNAME: postgres
      DB_PASSWORD: difyai123456
      DB_DATABASE: dify
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: difyai123456
      REDIS_DB: "0"
      CELERY_BROKER_URL: redis://:difyai123456@redis:6379/1
      CELERY_BACKEND: redis
      SECRET_KEY: a9f3e2c1d4b5087612345678abcdef90a9f3e2c1d4b5087612345678abcdef90
      DEPLOY_ENV: PRODUCTION
      LOG_LEVEL: INFO
    depends_on:
      db_postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - default
      - ssrf_proxy_network
      - coolify

  # ── Frontend Web ───────────────────────────────────────────────────────────
  web:
    image: langgenius/dify-web:1.13.2
    restart: always
    environment:
      CONSOLE_API_URL: http://care.jyotaish.in
      APP_API_URL: http://care.jyotaish.in
      NEXT_TELEMETRY_DISABLED: "1"
      MARKETPLACE_API_URL: https://marketplace.dify.ai
      MARKETPLACE_URL: https://marketplace.dify.ai

  # ── Nginx ──────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: always
    command:
      - sh
      - -c
      - |
        printf 'server {\n    listen 80;\n    server_name _;\n    client_max_body_size 100M;\n    proxy_read_timeout 300;\n    proxy_connect_timeout 60;\n\n    location /console/api {\n        proxy_pass http://api:5001;\n    }\n    location /api {\n        proxy_pass http://api:5001;\n    }\n    location /v1 {\n        proxy_pass http://api:5001;\n    }\n    location /files {\n        proxy_pass http://api:5001;\n    }\n    location /e/ {\n        proxy_pass http://plugin_daemon:5002;\n    }\n    location /mcp {\n        proxy_pass http://api:5001;\n    }\n    location /triggers {\n        proxy_pass http://api:5001;\n    }\n    location / {\n        proxy_pass http://web:3000;\n        proxy_http_version 1.1;\n    }\n}\n' > /etc/nginx/conf.d/default.conf
        nginx -g 'daemon off;'
    depends_on:
      - api
      - web
    expose:
      - "80"
    networks:
      - default
      - coolify
    labels:
      - "coolify.managed=true"
      - "traefik.enable=true"
      - "traefik.http.routers.dify.rule=Host(`care.jyotaish.in`)"
      - "traefik.http.routers.dify.entrypoints=http"
      - "traefik.http.services.dify.loadbalancer.server.port=80"
      - "traefik.docker.network=coolify"

networks:
  ssrf_proxy_network:
    driver: bridge
  coolify:
    external: true
