# ===========================================================================
# docker-compose.coolify.yaml
# Minimal, production-ready Dify stack for Coolify deployment.
#
# Differences from the auto-generated docker-compose.yaml:
#   - No `profiles:` on any service (Coolify does not activate profiles)
#   - Only the services required for a standard Dify production setup
#   - pg_isready healthcheck uses `localhost` (resolves inside the container)
#   - All secrets sourced from environment variables — set them in Coolify's
#     Environment Variables panel before deploying.
#
# Required env vars to set in Coolify:
#   SECRET_KEY            — openssl rand -base64 42
#   DB_PASSWORD           — strong password
#   REDIS_PASSWORD        — strong password
#   PLUGIN_DAEMON_KEY     — openssl rand -base64 42
#   PLUGIN_DIFY_INNER_API_KEY — openssl rand -base64 42
#   CONSOLE_API_URL       — e.g. http://care.jyotaish.in
#   APP_API_URL           — e.g. http://care.jyotaish.in
# ===========================================================================

x-shared-env: &shared-api-worker-env
  SECRET_KEY: ${SECRET_KEY:-changeme-use-openssl-rand-hex-32}
  CONSOLE_API_URL: ${CONSOLE_API_URL:-http://care.jyotaish.in}
  CONSOLE_WEB_URL: ${CONSOLE_WEB_URL:-http://care.jyotaish.in}
  APP_API_URL: ${APP_API_URL:-http://care.jyotaish.in}
  APP_WEB_URL: ${APP_WEB_URL:-http://care.jyotaish.in}
  SERVICE_API_URL: ${SERVICE_API_URL:-}
  FILES_URL: ${FILES_URL:-}
  TRIGGER_URL: ${TRIGGER_URL:-http://care.jyotaish.in}
  DEPLOY_ENV: PRODUCTION
  MIGRATION_ENABLED: "true"
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  LOG_OUTPUT_FORMAT: ${LOG_OUTPUT_FORMAT:-text}
  # Database
  DB_TYPE: postgresql
  DB_USERNAME: ${DB_USERNAME:-postgres}
  DB_PASSWORD: ${DB_PASSWORD:-difyai123456}
  DB_HOST: db_postgres
  DB_PORT: "5432"
  DB_DATABASE: ${DB_DATABASE:-dify}
  SQLALCHEMY_POOL_SIZE: ${SQLALCHEMY_POOL_SIZE:-30}
  SQLALCHEMY_MAX_OVERFLOW: ${SQLALCHEMY_MAX_OVERFLOW:-10}
  SQLALCHEMY_POOL_RECYCLE: ${SQLALCHEMY_POOL_RECYCLE:-3600}
  # Redis
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_PASSWORD: ${REDIS_PASSWORD:-difyai123456}
  REDIS_DB: "0"
  CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://:difyai123456@redis:6379/1}
  CELERY_BACKEND: redis
  # Vector store (Weaviate — no profile needed here)
  VECTOR_STORE: ${VECTOR_STORE:-weaviate}
  WEAVIATE_ENDPOINT: http://weaviate:8080
  WEAVIATE_API_KEY: ${WEAVIATE_API_KEY:-WVF5YThaHlkYwhGUSmCRgsX3tD5ngdN8pkih}
  WEAVIATE_GRPC_ENDPOINT: grpc://weaviate:50051
  # Storage
  STORAGE_TYPE: ${STORAGE_TYPE:-opendal}
  OPENDAL_SCHEME: ${OPENDAL_SCHEME:-fs}
  OPENDAL_FS_ROOT: ${OPENDAL_FS_ROOT:-storage}
  # Sandbox / SSRF
  CODE_EXECUTION_ENDPOINT: http://sandbox:8194
  CODE_EXECUTION_API_KEY: ${SANDBOX_API_KEY:-dify-sandbox}
  SSRF_PROXY_HTTP_URL: http://ssrf_proxy:3128
  SSRF_PROXY_http_URL: http://ssrf_proxy:3128
  # Plugin daemon
  PLUGIN_DAEMON_URL: http://plugin_daemon:5002
  PLUGIN_DAEMON_KEY: ${PLUGIN_DAEMON_KEY:-lYkiYYT6owG+71oLerGzA7GXCgOT++6ovaezWAjpCjf+Sjc3ZtU+qUEi}
  PLUGIN_DIFY_INNER_API_URL: http://api:5001
  PLUGIN_DIFY_INNER_API_KEY: ${PLUGIN_DIFY_INNER_API_KEY:-QaHbTe77CtuXmsfyhR7+vRjI/+XbV1AaFy691iy+kGDv2Jvy0/eAh8Y1}
  FORCE_VERIFYING_SIGNATURE: "true"
  MARKETPLACE_ENABLED: "true"
  MARKETPLACE_API_URL: http://marketplace.dify.ai
  # Coolify/Traefik proxy — tell Dify to trust forwarded headers
  RESPECT_XFORWARD_HEADERS_ENABLED: "true"
  # Plugin webhook URL template (replace with your domain)
  ENDPOINT_URL_TEMPLATE: ${ENDPOINT_URL_TEMPLATE:-http://care.jyotaish.in/e/{hook_id}}
  LOG_TZ: ${LOG_TZ:-UTC}
  # Access tokens
  INIT_PASSWORD: ${INIT_PASSWORD:-}
  ACCESS_TOKEN_EXPIRE_MINUTES: "60"
  REFRESH_TOKEN_EXPIRE_DAYS: "30"
  # CORS
  WEB_API_CORS_ALLOW_ORIGINS: ${WEB_API_CORS_ALLOW_ORIGINS:-*}
  CONSOLE_CORS_ALLOW_ORIGINS: ${CONSOLE_CORS_ALLOW_ORIGINS:-*}
  # Performance
  SERVER_WORKER_AMOUNT: ${SERVER_WORKER_AMOUNT:-1}
  SERVER_WORKER_CLASS: gevent
  GUNICORN_TIMEOUT: "360"

services:
  # ── Init ─────────────────────────────────────────────────────────────────
  init_permissions:
    image: busybox:latest
    command:
      - sh
      - -c
      - |
        FLAG="/app/api/storage/.init_permissions"
        if [ -f "$$FLAG" ]; then echo "Already initialized."; exit 0; fi
        chown -R 1001:1001 /app/api/storage && touch "$$FLAG"
        echo "Permissions initialized."
    volumes:
      - ./volumes/app/storage:/app/api/storage
    restart: "no"

  # ── Database ─────────────────────────────────────────────────────────────
  db_postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-difyai123456}
      POSTGRES_DB: ${DB_DATABASE:-dify}
      PGDATA: /var/lib/postgresql/data/pgdata
    command: >
      postgres -c 'max_connections=${POSTGRES_MAX_CONNECTIONS:-100}'
               -c 'shared_buffers=${POSTGRES_SHARED_BUFFERS:-128MB}'
               -c 'work_mem=${POSTGRES_WORK_MEM:-4MB}'
               -c 'maintenance_work_mem=${POSTGRES_MAINTENANCE_WORK_MEM:-64MB}'
               -c 'effective_cache_size=${POSTGRES_EFFECTIVE_CACHE_SIZE:-4096MB}'
    volumes:
      - ./volumes/db/data:/var/lib/postgresql/data
    healthcheck:
      # Use 'localhost' — the service name 'db_postgres' does not resolve
      # from inside the container itself during the health probe.
      test: ["CMD", "pg_isready", "-h", "localhost", "-U", "${DB_USERNAME:-postgres}", "-d", "${DB_DATABASE:-dify}"]
      interval: 5s
      timeout: 5s
      retries: 30

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:6-alpine
    restart: always
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD:-difyai123456}
    command: redis-server --requirepass ${REDIS_PASSWORD:-difyai123456}
    volumes:
      - ./volumes/redis/data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-difyai123456} ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 30

  # ── Vector Store ──────────────────────────────────────────────────────────
  weaviate:
    image: semitechnologies/weaviate:1.27.0
    # No profiles: key — always starts in Coolify
    restart: always
    volumes:
      - ./volumes/weaviate:/var/lib/weaviate
    environment:
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      QUERY_DEFAULTS_LIMIT: "25"
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "false"
      DEFAULT_VECTORIZER_MODULE: none
      CLUSTER_HOSTNAME: node1
      AUTHENTICATION_APIKEY_ENABLED: "true"
      AUTHENTICATION_APIKEY_ALLOWED_KEYS: ${WEAVIATE_API_KEY:-WVF5YThaHlkYwhGUSmCRgsX3tD5ngdN8pkih}
      AUTHENTICATION_APIKEY_USERS: hello@dify.ai
      AUTHORIZATION_ADMINLIST_ENABLED: "true"
      AUTHORIZATION_ADMINLIST_USERS: hello@dify.ai
      DISABLE_TELEMETRY: "true"

  # ── Sandbox ───────────────────────────────────────────────────────────────
  sandbox:
    image: langgenius/dify-sandbox:0.2.12
    restart: always
    environment:
      API_KEY: ${SANDBOX_API_KEY:-dify-sandbox}
      GIN_MODE: release
      WORKER_TIMEOUT: "15"
      ENABLE_NETWORK: "true"
      HTTP_PROXY: http://ssrf_proxy:3128
      http_PROXY: http://ssrf_proxy:3128
      SANDBOX_PORT: "8194"
    volumes:
      - ./volumes/sandbox/dependencies:/dependencies
      - ./volumes/sandbox/conf:/conf
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8194/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ssrf_proxy_network

  # ── SSRF Proxy ────────────────────────────────────────────────────────────
  ssrf_proxy:
    image: ubuntu/squid:latest
    restart: always
    volumes:
      - ./ssrf_proxy/squid.conf.template:/etc/squid/squid.conf.template
      - ./ssrf_proxy/docker-entrypoint.sh:/docker-entrypoint-mount.sh
    entrypoint:
      - sh
      - -c
      - "cp /docker-entrypoint-mount.sh /docker-entrypoint.sh && sed -i 's/\\r$$//' /docker-entrypoint.sh && chmod +x /docker-entrypoint.sh && /docker-entrypoint.sh"
    environment:
      HTTP_PORT: "3128"
      COREDUMP_DIR: /var/spool/squid
      REVERSE_PROXY_PORT: "8194"
      SANDBOX_HOST: sandbox
      SANDBOX_PORT: "8194"
    networks:
      - ssrf_proxy_network
      - default

  # ── Plugin Daemon ─────────────────────────────────────────────────────────
  plugin_daemon:
    image: langgenius/dify-plugin-daemon:0.5.4-local
    restart: always
    environment:
      <<: *shared-api-worker-env
      DB_DATABASE: ${DB_PLUGIN_DATABASE:-dify_plugin}
      SERVER_PORT: "5002"
      SERVER_KEY: ${PLUGIN_DAEMON_KEY:-lYkiYYT6owG+71oLerGzA7GXCgOT++6ovaezWAjpCjf+Sjc3ZtU+qUEi}
      DIFY_INNER_API_URL: http://api:5001
      DIFY_INNER_API_KEY: ${PLUGIN_DIFY_INNER_API_KEY:-QaHbTe77CtuXmsfyhR7+vRjI/+XbV1AaFy691iy+kGDv2Jvy0/eAh8Y1}
      PLUGIN_WORKING_PATH: /app/storage/cwd
      PLUGIN_STORAGE_TYPE: local
      PLUGIN_STORAGE_LOCAL_ROOT: /app/storage
      PPROF_ENABLED: "false"
    volumes:
      - ./volumes/plugin_daemon:/app/storage
    depends_on:
      db_postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── API ───────────────────────────────────────────────────────────────────
  api:
    image: langgenius/dify-api:1.13.2
    restart: always
    environment:
      <<: *shared-api-worker-env
      MODE: api
      INNER_API_KEY_FOR_PLUGIN: ${PLUGIN_DIFY_INNER_API_KEY}
    depends_on:
      init_permissions:
        condition: service_completed_successfully
      db_postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./volumes/app/storage:/app/api/storage
    networks:
      - ssrf_proxy_network
      - default

  # ── Worker ────────────────────────────────────────────────────────────────
  worker:
    image: langgenius/dify-api:1.13.2
    restart: always
    environment:
      <<: *shared-api-worker-env
      MODE: worker
      INNER_API_KEY_FOR_PLUGIN: ${PLUGIN_DIFY_INNER_API_KEY}
    depends_on:
      init_permissions:
        condition: service_completed_successfully
      db_postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./volumes/app/storage:/app/api/storage
    networks:
      - ssrf_proxy_network
      - default

  # ── Worker Beat ───────────────────────────────────────────────────────────
  worker_beat:
    image: langgenius/dify-api:1.13.2
    restart: always
    environment:
      <<: *shared-api-worker-env
      MODE: beat
    depends_on:
      db_postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ssrf_proxy_network
      - default

  # ── Frontend Web ──────────────────────────────────────────────────────────
  web:
    image: langgenius/dify-web:1.13.2
    restart: always
    environment:
      CONSOLE_API_URL: ${CONSOLE_API_URL:-http://care.jyotaish.in}
      APP_API_URL: ${APP_API_URL:-http://care.jyotaish.in}
      NEXT_TELEMETRY_DISABLED: "1"
      MARKETPLACE_API_URL: http://marketplace.dify.ai
      MARKETPLACE_URL: http://marketplace.dify.ai

  # ── Nginx ─────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:latest
    restart: always
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/nginx.conf.template
      - ./nginx/proxy.conf.template:/etc/nginx/proxy.conf.template
      - ./nginx/http.conf.template:/etc/nginx/http.conf.template
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/docker-entrypoint.sh:/docker-entrypoint-mount.sh
      - ./nginx/ssl:/etc/ssl
      - ./volumes/certbot/conf/live:/etc/letsencrypt/live
      - ./volumes/certbot/conf:/etc/letsencrypt
      - ./volumes/certbot/www:/var/www/html
    entrypoint:
      - sh
      - -c
      - "cp /docker-entrypoint-mount.sh /docker-entrypoint.sh && sed -i 's/\\r$$//' /docker-entrypoint.sh && chmod +x /docker-entrypoint.sh && /docker-entrypoint.sh"
    environment:
      # Set NGINX_SERVER_NAME to your domain or leave as _ for catch-all
      NGINX_SERVER_NAME: ${NGINX_SERVER_NAME:-care.jyotaish.in}
      # Coolify handles TLS termination — keep http disabled in nginx
      NGINX_http_ENABLED: "false"
      NGINX_PORT: "80"
      NGINX_SSL_PORT: "443"
      NGINX_SSL_CERT_FILENAME: dify.crt
      NGINX_SSL_CERT_KEY_FILENAME: dify.key
      NGINX_SSL_PROTOCOLS: TLSv1.2 TLSv1.3
      NGINX_WORKER_PROCESSES: auto
      NGINX_CLIENT_MAX_BODY_SIZE: 100M
      NGINX_KEEPALIVE_TIMEOUT: "65"
      NGINX_PROXY_READ_TIMEOUT: 3600s
      NGINX_PROXY_SEND_TIMEOUT: 3600s
      NGINX_ENABLE_CERTBOT_CHALLENGE: "false"
    depends_on:
      - api
      - web
    # No host port bindings — Coolify's Traefik owns ports 80/443 on the host.
    # Traefik routes to this container's internal port 80 via the domain
    # configured in the Coolify resource → Domains panel.
    # ports:
    #   - "80:80"
    #   - "443:443"

networks:
  ssrf_proxy_network:
    driver: bridge
