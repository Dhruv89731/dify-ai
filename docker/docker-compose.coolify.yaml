# ===========================================================================
# docker-compose.coolify.yaml  —  Dify on Coolify (Definitive Version)
#
# ALL connection-critical values are hardcoded literals.
# No YAML anchors. No ${VAR} substitution for required fields.
# Coolify's --env-file cannot blank out any critical config.
#
# Passwords used (change in Coolify env panel to override):
#   DB:    difyai123456
#   Redis: difyai123456
# ===========================================================================

services:

  # ── Init ───────────────────────────────────────────────────────────────────
  init_permissions:
    image: busybox:latest
    command:
      - sh
      - -c
      - |
        chown -R 1001:1001 /app/api/storage
        echo "Permissions set."
    volumes:
      - ./volumes/app/storage:/app/api/storage
    restart: "no"

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db_postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: difyai123456
      POSTGRES_DB: dify
      PGDATA: /var/lib/postgresql/data/pgdata
    command: >
      postgres
        -c max_connections=100
        -c shared_buffers=128MB
        -c work_mem=4MB
        -c maintenance_work_mem=64MB
        -c effective_cache_size=4096MB
    volumes:
      - ./volumes/db/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-U", "postgres", "-d", "dify"]
      interval: 5s
      timeout: 5s
      retries: 30

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:6-alpine
    restart: always
    command: redis-server --requirepass difyai123456
    volumes:
      - ./volumes/redis/data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a difyai123456 ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 30

  # ── Weaviate ───────────────────────────────────────────────────────────────
  weaviate:
    image: semitechnologies/weaviate:1.27.0
    restart: always
    volumes:
      - ./volumes/weaviate:/var/lib/weaviate
    environment:
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      QUERY_DEFAULTS_LIMIT: "25"
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "false"
      DEFAULT_VECTORIZER_MODULE: none
      CLUSTER_HOSTNAME: node1
      AUTHENTICATION_APIKEY_ENABLED: "true"
      AUTHENTICATION_APIKEY_ALLOWED_KEYS: WVF5YThaHlkYwhGUSmCRgsX3tD5ngdN8pkih
      AUTHENTICATION_APIKEY_USERS: hello@dify.ai
      AUTHORIZATION_ADMINLIST_ENABLED: "true"
      AUTHORIZATION_ADMINLIST_USERS: hello@dify.ai
      DISABLE_TELEMETRY: "true"

  # ── Sandbox ────────────────────────────────────────────────────────────────
  sandbox:
    image: langgenius/dify-sandbox:0.2.12
    restart: always
    environment:
      API_KEY: dify-sandbox
      GIN_MODE: release
      WORKER_TIMEOUT: "15"
      ENABLE_NETWORK: "true"
      HTTP_PROXY: http://ssrf_proxy:3128
      HTTPS_PROXY: http://ssrf_proxy:3128
      SANDBOX_PORT: "8194"
    volumes:
      - ./volumes/sandbox/dependencies:/dependencies
      - ./volumes/sandbox/conf:/conf
    networks:
      - ssrf_proxy_network

  # ── SSRF Proxy ─────────────────────────────────────────────────────────────
  ssrf_proxy:
    image: ubuntu/squid:latest
    restart: always
    volumes:
      - ./ssrf_proxy/squid.conf.template:/etc/squid/squid.conf.template
      - ./ssrf_proxy/docker-entrypoint.sh:/docker-entrypoint-mount.sh
    entrypoint:
      - sh
      - -c
      - "cp /docker-entrypoint-mount.sh /docker-entrypoint.sh && sed -i 's/\\r$$//' /docker-entrypoint.sh && chmod +x /docker-entrypoint.sh && /docker-entrypoint.sh"
    environment:
      HTTP_PORT: "3128"
      COREDUMP_DIR: /var/spool/squid
      REVERSE_PROXY_PORT: "8194"
      SANDBOX_HOST: sandbox
      SANDBOX_PORT: "8194"
    networks:
      - ssrf_proxy_network
      - default

  # ── Plugin Daemon ──────────────────────────────────────────────────────────
  plugin_daemon:
    image: langgenius/dify-plugin-daemon:0.5.4-local
    restart: always
    environment:
      # Database — all literals
      DB_TYPE: postgresql
      DB_HOST: db_postgres
      DB_PORT: "5432"
      DB_USERNAME: postgres
      DB_PASSWORD: difyai123456
      DB_DATABASE: dify_plugin
      # Redis — all literals
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: difyai123456
      REDIS_DB: "0"
      # Server
      SECRET_KEY: ${SECRET_KEY:-changeme-replace-with-openssl-rand-hex-32}
      SERVER_PORT: "5002"
      SERVER_KEY: lYkiYYT6owG+71oLerGzA7GXCgOT++6ovaezWAjpCjf+Sjc3ZtU+qUEi
      # Inner API
      DIFY_INNER_API_URL: http://api:5001
      DIFY_INNER_API_KEY: QaHbTe77CtuXmsfyhR7+vRjI/+XbV1AaFy691iy+kGDv2Jvy0/eAh8Y1
      # Remote plugin installing
      PLUGIN_REMOTE_INSTALLING_HOST: 0.0.0.0
      PLUGIN_REMOTE_INSTALLING_PORT: "5003"
      # Storage
      PLUGIN_WORKING_PATH: /app/storage/cwd
      PLUGIN_STORAGE_TYPE: local
      PLUGIN_STORAGE_LOCAL_ROOT: /app/storage
      PLUGIN_INSTALLED_PATH: plugin
      PLUGIN_PACKAGE_CACHE_PATH: plugin_packages
      PLUGIN_MEDIA_CACHE_PATH: assets
      MAX_PLUGIN_PACKAGE_SIZE: "52428800"
      PLUGIN_MAX_EXECUTION_TIMEOUT: "600"
      PLUGIN_STDIO_BUFFER_SIZE: "1024"
      PLUGIN_STDIO_MAX_BUFFER_SIZE: "5242880"
      PYTHON_ENV_INIT_TIMEOUT: "120"
      # Misc
      PPROF_ENABLED: "false"
      FORCE_VERIFYING_SIGNATURE: "true"
      MARKETPLACE_ENABLED: "true"
      MARKETPLACE_API_URL: https://marketplace.dify.ai
      DEPLOY_ENV: PRODUCTION
      LOG_LEVEL: INFO
    volumes:
      - ./volumes/plugin_daemon:/app/storage
    depends_on:
      db_postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── API ────────────────────────────────────────────────────────────────────
  api:
    image: langgenius/dify-api:1.13.2
    restart: always
    environment:
      MODE: api
      # Database — all literals
      DB_TYPE: postgresql
      DB_HOST: db_postgres
      DB_PORT: "5432"
      DB_USERNAME: postgres
      DB_PASSWORD: difyai123456
      DB_DATABASE: dify
      # Redis — all literals
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: difyai123456
      REDIS_DB: "0"
      CELERY_BROKER_URL: redis://:difyai123456@redis:6379/1
      CELERY_BACKEND: redis
      # URLs
      CONSOLE_API_URL: https://care.jyotaish.in
      CONSOLE_WEB_URL: https://care.jyotaish.in
      APP_API_URL: https://care.jyotaish.in
      APP_WEB_URL: https://care.jyotaish.in
      SERVICE_API_URL: https://care.jyotaish.in
      FILES_URL: https://care.jyotaish.in
      ENDPOINT_URL_TEMPLATE: https://care.jyotaish.in/e/{hook_id}
      # Security
      SECRET_KEY: ${SECRET_KEY:-changeme-replace-with-openssl-rand-hex-32}
      INNER_API_KEY_FOR_PLUGIN: QaHbTe77CtuXmsfyhR7+vRjI/+XbV1AaFy691iy+kGDv2Jvy0/eAh8Y1
      # Plugin
      PLUGIN_DAEMON_URL: http://plugin_daemon:5002
      PLUGIN_DAEMON_KEY: lYkiYYT6owG+71oLerGzA7GXCgOT++6ovaezWAjpCjf+Sjc3ZtU+qUEi
      PLUGIN_DIFY_INNER_API_URL: http://api:5001
      PLUGIN_DIFY_INNER_API_KEY: QaHbTe77CtuXmsfyhR7+vRjI/+XbV1AaFy691iy+kGDv2Jvy0/eAh8Y1
      # Storage
      STORAGE_TYPE: opendal
      OPENDAL_SCHEME: fs
      OPENDAL_FS_ROOT: storage
      # Vector store
      VECTOR_STORE: weaviate
      WEAVIATE_ENDPOINT: http://weaviate:8080
      WEAVIATE_API_KEY: WVF5YThaHlkYwhGUSmCRgsX3tD5ngdN8pkih
      WEAVIATE_GRPC_ENDPOINT: grpc://weaviate:50051
      # Sandbox / SSRF
      CODE_EXECUTION_ENDPOINT: http://sandbox:8194
      CODE_EXECUTION_API_KEY: dify-sandbox
      SSRF_PROXY_HTTP_URL: http://ssrf_proxy:3128
      SSRF_PROXY_HTTPS_URL: http://ssrf_proxy:3128
      # Misc
      DEPLOY_ENV: PRODUCTION
      MIGRATION_ENABLED: "true"
      LOG_LEVEL: INFO
      WEB_API_CORS_ALLOW_ORIGINS: "*"
      CONSOLE_CORS_ALLOW_ORIGINS: "*"
      RESPECT_XFORWARD_HEADERS_ENABLED: "true"
      SERVER_WORKER_AMOUNT: "1"
      SERVER_WORKER_CLASS: gevent
      GUNICORN_TIMEOUT: "360"
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      REFRESH_TOKEN_EXPIRE_DAYS: "30"
      MARKETPLACE_ENABLED: "true"
      MARKETPLACE_API_URL: https://marketplace.dify.ai
      FORCE_VERIFYING_SIGNATURE: "true"
      INIT_PASSWORD: ${INIT_PASSWORD:-}
    depends_on:
      init_permissions:
        condition: service_completed_successfully
      db_postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./volumes/app/storage:/app/api/storage
    networks:
      - ssrf_proxy_network
      - default

  # ── Worker ─────────────────────────────────────────────────────────────────
  worker:
    image: langgenius/dify-api:1.13.2
    restart: always
    environment:
      MODE: worker
      # Database — all literals
      DB_TYPE: postgresql
      DB_HOST: db_postgres
      DB_PORT: "5432"
      DB_USERNAME: postgres
      DB_PASSWORD: difyai123456
      DB_DATABASE: dify
      # Redis — all literals
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: difyai123456
      REDIS_DB: "0"
      CELERY_BROKER_URL: redis://:difyai123456@redis:6379/1
      CELERY_BACKEND: redis
      # URLs
      CONSOLE_API_URL: https://care.jyotaish.in
      CONSOLE_WEB_URL: https://care.jyotaish.in
      APP_API_URL: https://care.jyotaish.in
      APP_WEB_URL: https://care.jyotaish.in
      # Security
      SECRET_KEY: ${SECRET_KEY:-changeme-replace-with-openssl-rand-hex-32}
      INNER_API_KEY_FOR_PLUGIN: QaHbTe77CtuXmsfyhR7+vRjI/+XbV1AaFy691iy+kGDv2Jvy0/eAh8Y1
      # Plugin
      PLUGIN_DAEMON_URL: http://plugin_daemon:5002
      PLUGIN_DAEMON_KEY: lYkiYYT6owG+71oLerGzA7GXCgOT++6ovaezWAjpCjf+Sjc3ZtU+qUEi
      # Storage
      STORAGE_TYPE: opendal
      OPENDAL_SCHEME: fs
      OPENDAL_FS_ROOT: storage
      # Vector store
      VECTOR_STORE: weaviate
      WEAVIATE_ENDPOINT: http://weaviate:8080
      WEAVIATE_API_KEY: WVF5YThaHlkYwhGUSmCRgsX3tD5ngdN8pkih
      # Sandbox / SSRF
      CODE_EXECUTION_ENDPOINT: http://sandbox:8194
      CODE_EXECUTION_API_KEY: dify-sandbox
      SSRF_PROXY_HTTP_URL: http://ssrf_proxy:3128
      SSRF_PROXY_HTTPS_URL: http://ssrf_proxy:3128
      # Misc
      DEPLOY_ENV: PRODUCTION
      LOG_LEVEL: INFO
      RESPECT_XFORWARD_HEADERS_ENABLED: "true"
    depends_on:
      init_permissions:
        condition: service_completed_successfully
      db_postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./volumes/app/storage:/app/api/storage
    networks:
      - ssrf_proxy_network
      - default

  # ── Worker Beat ────────────────────────────────────────────────────────────
  worker_beat:
    image: langgenius/dify-api:1.13.2
    restart: always
    environment:
      MODE: beat
      # Database — all literals
      DB_TYPE: postgresql
      DB_HOST: db_postgres
      DB_PORT: "5432"
      DB_USERNAME: postgres
      DB_PASSWORD: difyai123456
      DB_DATABASE: dify
      # Redis — all literals
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: difyai123456
      REDIS_DB: "0"
      CELERY_BROKER_URL: redis://:difyai123456@redis:6379/1
      CELERY_BACKEND: redis
      # Security
      SECRET_KEY: ${SECRET_KEY:-changeme-replace-with-openssl-rand-hex-32}
      # Misc
      DEPLOY_ENV: PRODUCTION
      LOG_LEVEL: INFO
    depends_on:
      db_postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ssrf_proxy_network
      - default

  # ── Frontend Web ───────────────────────────────────────────────────────────
  web:
    image: langgenius/dify-web:1.13.2
    restart: always
    environment:
      CONSOLE_API_URL: https://care.jyotaish.in
      APP_API_URL: https://care.jyotaish.in
      NEXT_TELEMETRY_DISABLED: "1"
      MARKETPLACE_API_URL: https://marketplace.dify.ai
      MARKETPLACE_URL: https://marketplace.dify.ai

  # ── Nginx ──────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:latest
    restart: always
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/nginx.conf.template
      - ./nginx/proxy.conf.template:/etc/nginx/proxy.conf.template
      - ./nginx/https.conf.template:/etc/nginx/https.conf.template
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/docker-entrypoint.sh:/docker-entrypoint-mount.sh
      - ./nginx/ssl:/etc/ssl
      - ./volumes/certbot/conf/live:/etc/letsencrypt/live
      - ./volumes/certbot/conf:/etc/letsencrypt
      - ./volumes/certbot/www:/var/www/html
    entrypoint:
      - sh
      - -c
      - "cp /docker-entrypoint-mount.sh /docker-entrypoint.sh && sed -i 's/\\r$$//' /docker-entrypoint.sh && chmod +x /docker-entrypoint.sh && /docker-entrypoint.sh"
    environment:
      NGINX_SERVER_NAME: care.jyotaish.in
      NGINX_HTTPS_ENABLED: "false"
      NGINX_PORT: "80"
      NGINX_SSL_PORT: "443"
      NGINX_SSL_CERT_FILENAME: dify.crt
      NGINX_SSL_CERT_KEY_FILENAME: dify.key
      NGINX_SSL_PROTOCOLS: TLSv1.2 TLSv1.3
      NGINX_WORKER_PROCESSES: auto
      NGINX_CLIENT_MAX_BODY_SIZE: 100M
      NGINX_KEEPALIVE_TIMEOUT: "65"
      NGINX_PROXY_READ_TIMEOUT: 3600s
      NGINX_PROXY_SEND_TIMEOUT: 3600s
      NGINX_ENABLE_CERTBOT_CHALLENGE: "false"
    depends_on:
      - api
      - web
    # No host port bindings — Coolify's Traefik owns 80/443.
    # Set domain on 'nginx' service in Coolify → Domains panel (port 80).

networks:
  ssrf_proxy_network:
    driver: bridge
